<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
<script>
    async function generateImage(prompt) {
        try {
            Android.onStatus("generating");
            const result = await puter.ai.txt2img(prompt);
            // result is a Blob (or has a blob property depending on SDK version)
            const blob = result instanceof Blob ? result : result.image;
            const reader = new FileReader();
            reader.onloadend = function() {
                // reader.result is a data URL: data:image/png;base64,xxxxx
                const base64 = reader.result.split(',')[1];
                Android.onImageReady(base64);
            };
            reader.onerror = function() {
                Android.onError("Failed to read image blob");
            };
            reader.readAsDataURL(blob);
        } catch (e) {
            Android.onError(e.message || "Unknown Puter.js error");
        }
    }
</script>
</body>
</html>
